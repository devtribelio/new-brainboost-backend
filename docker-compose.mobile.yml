# Mobile-api stack: ONE image, THREE entrypoints (api / cron / relay).
#   docker compose -f docker-compose.mobile.yml up --build
# Postgres + RabbitMQ assumed EXTERNAL — provide via .env (DATABASE_URL, RABBITMQ_URL).
# Migrations are NOT run here — run `pnpm prisma:deploy` against the DB first.
name: bb-mobile

# Shared base: same image + env for all three processes. Only CMD differs.
x-mobile: &mobile
  image: bb/mobile-api
  build:
    context: .
    dockerfile: apps/mobile-api/Dockerfile
  env_file: .env
  restart: unless-stopped

services:
  # HTTP API (:3000). Scalable horizontally.
  api:
    <<: *mobile
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    # CMD default = node dist/main.js
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # Comms outbox -> RabbitMQ relay. SINGLE instance only (plain PENDING->SENT
  # flip, no SKIP LOCKED -> 2 replicas double-publish). Do NOT scale.
  relay:
    <<: *mobile
    environment:
      NODE_ENV: production
    command: ["node", "dist/workers/comms-relay.js"]
    # Image bakes a HEALTHCHECK hitting :3000/health (for the API). relay has no
    # HTTP server -> disable it here so relay isn't wrongly marked unhealthy.
    healthcheck:
      disable: true
    depends_on:
      api:
        condition: service_healthy

  # Cron one-shot: runs every job once then EXITS. Not a long-lived service.
  # restart:no so it stays Exited(0) after a tick. In prod, drive it from an
  # external scheduler (k8s CronJob / ECS scheduled task / host cron) calling
  # the same image+command — NOT compose restart loops.
  cron:
    <<: *mobile
    restart: "no"
    environment:
      NODE_ENV: production
    command: ["node", "dist/jobs-runner.js"]
    healthcheck:
      disable: true
    depends_on:
      api:
        condition: service_healthy
