name: security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1' # every Monday 00:00 UTC

permissions:
  contents: read

jobs:
  # --- Step 2: dependency vulnerability audit (OSV-Scanner) ---
  # `pnpm audit` was retired: npm removed the legacy audit endpoint it calls
  # (HTTP 410), so it can no longer run. OSV-Scanner reads pnpm-lock.yaml
  # directly against the OSV database — no registry endpoint, no install needed.
  dep-audit:
    name: dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Production deps must be clean. Dev/build-tooling advisories (not in the
      # prod tree) are triaged in .osv-scanner.prod.toml; anything else — any
      # production vulnerability — fails the build.
      - name: audit (prod, blocking)
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" ghcr.io/google/osv-scanner:latest \
            --config=/src/.osv-scanner.prod.toml --lockfile=/src/pnpm-lock.yaml
      # Full report incl. the triaged dev-tooling advisories — visible in the
      # logs for awareness, never blocks (scans without the ignore file).
      - name: audit (all, advisory)
        if: always()
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" ghcr.io/google/osv-scanner:latest \
            --lockfile=/src/pnpm-lock.yaml || true

  # --- Step 1: secret leak scan over full git history ---
  secret-scan:
    name: secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks scans every commit
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false

  # --- Step 3: static analysis (CodeQL) ---
  codeql:
    name: codeql
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3
