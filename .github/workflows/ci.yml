name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which app/package trees changed so we only build what's affected.
  # Any packages/** change fans out to all apps (shared code).
  changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.filter.outputs.packages }}
      mobile: ${{ steps.filter.outputs.mobile }}
      backoffice: ${{ steps.filter.outputs.backoffice }}
      admin: ${{ steps.filter.outputs.admin }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            packages: ['packages/**', 'prisma/**', 'pnpm-lock.yaml', 'tsconfig.base.json']
            mobile: ['apps/mobile-api/**']
            backoffice: ['apps/backoffice-api/**']
            admin: ['apps/admin-ejs/**']

  test:
    runs-on: ubuntu-latest
    needs: changes
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bb_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bb_test
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma:generate
      - run: pnpm prisma:deploy
      - run: pnpm build:packages
      - run: pnpm -r typecheck
      - run: pnpm test

  build:
    runs-on: ubuntu-latest
    needs: [changes, test]
    strategy:
      matrix:
        include:
          - app: mobile-api
            run: ${{ needs.changes.outputs.mobile == 'true' || needs.changes.outputs.packages == 'true' }}
          - app: backoffice-api
            run: ${{ needs.changes.outputs.backoffice == 'true' || needs.changes.outputs.packages == 'true' }}
          - app: admin-ejs
            run: ${{ needs.changes.outputs.admin == 'true' || needs.changes.outputs.packages == 'true' }}
    steps:
      - uses: actions/checkout@v4
        if: matrix.run == 'true'
      - uses: docker/setup-buildx-action@v3
        if: matrix.run == 'true'
      - name: Build ${{ matrix.app }} image
        if: matrix.run == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: false
          tags: bb/${{ matrix.app }}:${{ github.sha }}
